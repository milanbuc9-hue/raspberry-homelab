global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'homeassistant'
    static_configs:
      - targets: ['172.20.0.1:8123']
    metrics_path: '/api/prometheus'
    bearer_token_file: /etc/prometheus/ha_token.txt

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['172.20.0.1:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'n8n'
    static_configs:
      - targets: ['n8n:5678']
    metrics_path: '/metrics'

  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://172.20.0.1:8091          # gym-tracker lokal
          - https://api.milanbuchta.com     # gym-tracker Cloudflare
          - https://milanbuchta.com         # Milan Buchta Website
          - http://172.20.0.1:8123          # Home Assistant lokal
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
